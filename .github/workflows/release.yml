name: release.yml
on:
  workflow_call:
    inputs:
      name:
        description: 'docker image name'
        required: true
        type: string
      harborProject:
        required: true
        type: string
      manifestFile:
        required: true
        type: string
      repository:
        required: true
        type: string
      harborUser:
        required: true
        type: string
      dockerFile:
        required: false
        default: "./Dockerfile"
        type: string
      buildArgs:
        description: 'Docker build arguments (JSON format)'
        required: false
        type: string
        default: '{}'
      context:
        required: false
        type: string
        default: "."
    secrets:
      HARBOR_PASS:
        required: true
      GIT_TOKEN:
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      dir: "./"
      dockerFile: ${{ inputs.dockerFile }}
      name: ${{ inputs.name }}
      dockerRepository: harbor.kigawa.net/${{ inputs.harborProject }}
    steps:
      # checkout
      - uses: actions/checkout@v4

      # docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: harbor.kigawa.net
          username: ${{ inputs.harborUser }}
          password: ${{ secrets.HARBOR_PASS }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          # list of Docker images to use as base name for tags
          images: |
            ${{ env.dockerRepository }}/${{ env.name }}
          # generate Docker tags based on the following events/attributes
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=raw,value=${{ github.ref_name }}-${{ github.sha }}

      - name: Parse build args
        id: build-args
        run: |
          echo "args<<EOF" >> $GITHUB_OUTPUT
          echo '${{ inputs.buildArgs }}' | jq -r 'to_entries | map("\(.key)=\(.value)") | join("\n")' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      - uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ env.dockerFile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ steps.build-args.outputs.args }}

      # argo
      - name: checkout manifest repository
        uses: actions/checkout@v3
        if: inputs.manifestFile != '' && inputs.repository != ''
        with:
          repository: ${{ inputs.repository }}
          ref: main
          token: ${{ secrets.GIT_TOKEN }}

      - name: Update YAML File
        if: inputs.manifestFile != '' && inputs.repository != ''
        run: |
          yq -i '.spec.template.spec.containers[0].image = "harbor.kigawa.net/${{ inputs.harborProject }}/${{ inputs.name }}:${{ github.ref_name }}-${{ github.sha }}"' \
          ${{ inputs.manifestFile }}

      - name: push
        if: inputs.manifestFile != '' && inputs.repository != ''
        run: |
          git config user.name githubActions
          git config user.email bot@kigawa.net
          git add .
          git commit --author=. -m "update rev"
          git push
